<!--
title: Coupon Code
description: Apply a discount coupon to the cart with success/error feedback.
order: 1
-->

<div data-next-coupon>
  <div class="row">
    <input
      type="text"
      placeholder="Enter coupon code"
      data-next-coupon-input
    />
    <button data-next-action="apply-coupon">Apply</button>
  </div>
  <p class="msg msg-ok">✓ Coupon applied!</p>
  <p class="msg msg-err">✗ Invalid or expired coupon.</p>
</div>

<style>
  body { font-family: sans-serif; padding: 24px; max-width: 400px; }
  .row { display: flex; gap: 8px; }
  input {
    flex: 1; padding: 10px 12px; border: 1px solid #d1d5db;
    border-radius: 6px; font-size: 14px; outline: none;
  }
  input:focus { border-color: #6366f1; box-shadow: 0 0 0 2px #eef2ff; }
  button {
    padding: 10px 16px; background: #374151; color: white;
    border: none; border-radius: 6px; cursor: pointer; font-size: 14px;
  }
  button:hover { background: #1f2937; }
  .msg { margin-top: 8px; font-size: 13px; display: none; }
  /* SDK adds .next-coupon-applied or .next-coupon-error to the [data-next-coupon] wrapper */
  [data-next-coupon].next-coupon-applied .msg-ok  { display: block; color: #059669; }
  [data-next-coupon].next-coupon-error   .msg-err { display: block; color: #dc2626; }
</style>
