<!--
title: Normal
description: Static bundle cards where each unit can have its own color / size. "configurable": true expands a quantity-N item into N independent slots, each with its own variant controls.
order: 2
-->

<!--
  HOW THIS WORKS:
  ─────────────────────────────────────────────────────────────────────────────
  BundleSelectorEnhancer (data-next-bundle-selector):
    Registers every [data-next-bundle-card] inside it.
    Selecting a card replaces the previous bundle's packages in the cart with
    the new bundle's packages, leaving unrelated cart items untouched.

  ── STATIC CARD MODE ─────────────────────────────────────────────────────────
    Write bundle cards directly in HTML. Useful when each card needs unique
    markup, or when combining slot rendering with static card structure.

    Each card needs:
      data-next-bundle-card         — marks the card
      data-next-bundle-id           — unique bundle identifier
      data-next-bundle-items        — JSON array of {packageId, quantity, configurable?}

  ── PER-ITEM SLOT TEMPLATES (variant selectors) ───────────────────────────────
    data-next-bundle-slot-template-id="<id>"
      ID of a <template> rendered once per slot. When configurable: true, a
      quantity-N item expands into N individual slots with independent controls.
      Slot template variables:
        {slot.index}       — 1-based slot number (unique across all slots)
        {slot.unitNumber}  — 1-based unit index within a configurable item
        {item.packageId}   — current package ref_id
        {item.name}        — package name
        {item.image}       — package image URL
        {item.price}       — package price
        {item.variantName} — variant display name (e.g. "Black / S")
        {item.productName} — product name

      Place data-next-variant-selectors inside the template where variant
      controls (dropdowns or swatches) should be injected.

    data-next-variant-option-template-id="<id>"  (optional)
      Template for a single variant option (e.g. a swatch button).
      Omit to use default <select> dropdowns.
      Option template variables:
        {option.value}    — option value (e.g. "Red")
        {option.selected} — "true" / "false"
      CSS class next-variant-selected and data-selected="true" are set on
      the currently selected option element.

    Place data-next-bundle-slots inside a bundle card to mark where per-item
    slot rows are injected.

  Item fields:
    packageId    (required) — package ref_id
    quantity     (required) — number of units
    configurable (optional) — when true, quantity > 1 is expanded into
                              individual slots so each unit can have its own
                              variant selection.

  SDK-managed attributes / CSS classes on each card:
    data-next-selected="true/false"
    .next-selected  — currently selected bundle
    .next-in-cart   — all bundle items present in cart at required qty
  ─────────────────────────────────────────────────────────────────────────────
-->


<section class="demo-section">
  <h2>Choose Your Bundle</h2>
  <p class="subtitle">Pick a size &amp; color for every unit — mix &amp; match freely.</p>

  <!--
    Slot template — rendered once per slot (one per unit when configurable).
    {slot.unitNumber} shows "Unit 1", "Unit 2", etc. for expanded items.
    Place data-next-variant-selectors where the SDK should inject controls.
  -->
  <template id="slot-tpl">
    <div class="slot-row">
      <img class="slot-img" src="{item.image}" alt="{item.name}" />
      <div class="slot-info">
        <p class="slot-name">{item.productName} <span class="slot-unit-label">Unit {slot.unitNumber}</span></p>
        <!-- Variant dropdowns / swatches are injected here -->
        <div class="slot-selectors" data-next-variant-selectors></div>
      </div>
      <p class="slot-price">{item.price}</p>
    </div>
  </template>

  <!--
    Custom variant option template — renders a swatch button per option value.
    Omit data-next-variant-option-template-id to use default <select> dropdowns.
  -->
  <template id="variant-opt-tpl">
    <button class="variant-btn" data-selected="{option.selected}">
      {option.value}
    </button>
  </template>

  <!--
    data-next-bundle-slot-template-id enables per-unit slot rendering.
    data-next-variant-option-template-id replaces <select> with swatch buttons.
  -->
  <div class="bundle-list"
       data-next-bundle-selector
       data-next-selection-mode="swap"
       data-next-bundle-slot-template-id="slot-tpl"
       data-next-variant-option-template-id="variant-opt-tpl">

    <!--
      Bundle card: 2 individually configurable units + 1 free non-configurable item.
      "configurable": true on the first item expands quantity 2 into 2 separate slots,
      each with its own Size / Color controls.
      Replace packageId values with real ref_ids from your campaign.
    -->
    <div class="bundle-card"
         data-next-bundle-card
         data-next-bundle-id="buy2"
         data-next-bundle-items='[
           { "packageId": 1, "quantity": 2, "configurable": true },
           { "packageId": 10, "quantity": 1 }
         ]'
         data-next-selected="true">

      <div class="card-header">
        <div class="radio" aria-hidden="true"></div>
        <div class="bundle-body">
          <p class="bundle-name">
            Buy 2, Get 1 FREE
            <span class="badge">Best Deal</span>
          </p>
          <p class="bundle-tagline">Configure each unit independently</p>
        </div>
        <div class="bundle-price">
          <p class="price-was">$82.00</p>
          <p class="price-now">$49.00</p>
        </div>
      </div>

      <!-- Per-unit slot rows are injected here by the SDK -->
      <div class="slots-container" data-next-bundle-slots></div>

    </div>

    <div class="bundle-card"
         data-next-bundle-card
         data-next-bundle-id="buy1"
         data-next-bundle-items='[
           { "packageId": 1, "quantity": 1 }
         ]'>

      <div class="card-header">
        <div class="radio" aria-hidden="true"></div>
        <div class="bundle-body">
          <p class="bundle-name">Buy 1</p>
          <p class="bundle-tagline">Pick your size &amp; color</p>
        </div>
        <div class="bundle-price">
          <p class="price-was">$41.00</p>
          <p class="price-now">$25.00</p>
        </div>
      </div>

      <div class="slots-container" data-next-bundle-slots></div>

    </div>

  </div>

  <button class="cta"
          data-next-action="add-to-cart"
          data-next-url="/checkout">
    Continue to Checkout
  </button>
</section>


<style>
  body { font-family: sans-serif; padding: 32px; max-width: 680px; }

  .demo-section { margin-bottom: 56px; }

  h2       { font-size: 20px; font-weight: 700; color: #111; margin: 0 0 6px; text-align: center; }
  .subtitle { font-size: 14px; color: #6b7280; margin: 0 0 24px; text-align: center; }

  /* ── Bundle list ── */
  .bundle-list { display: flex; flex-direction: column; gap: 10px; }

  /* ── Bundle card ── */
  .bundle-card {
    border: 2px solid #e5e7eb;
    border-radius: 14px;
    background: white;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    user-select: none;
    overflow: hidden;
  }
  .bundle-card:hover { border-color: #9ca3af; }
  .bundle-card.next-selected {
    border-color: #111;
    background: #f9fafb;
  }

  /* ── Card header ── */
  .card-header {
    display: grid;
    grid-template-columns: 24px 1fr auto;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
  }

  /* ── Radio dot ── */
  .radio {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid #d1d5db; background: white;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: border-color .15s;
  }
  .bundle-card.next-selected .radio { border-color: #111; }
  .radio::after {
    content: ''; width: 10px; height: 10px; border-radius: 50%;
    background: #111; opacity: 0; transition: opacity .15s;
  }
  .bundle-card.next-selected .radio::after { opacity: 1; }

  /* ── Bundle body ── */
  .bundle-name {
    font-size: 15px; font-weight: 700; color: #111;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    margin: 0;
  }
  .bundle-tagline { font-size: 13px; color: #6b7280; margin: 3px 0 0; }

  /* Badge — hidden when empty */
  .badge {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
    padding: 3px 9px; border-radius: 20px;
    background: #ecfdf5; color: #059669;
  }
  .badge:empty { display: none; }

  /* ── Price column ── */
  .bundle-price { text-align: right; white-space: nowrap; }
  .price-was  { font-size: 12px; color: #9ca3af; text-decoration: line-through; margin: 0; }
  .price-now  { font-size: 18px; font-weight: 700; color: #111; margin: 0; }
  .price-save { font-size: 12px; font-weight: 600; color: #059669; margin: 0; }

  /* ── Slot rows ── */
  .slots-container {
    border-top: 1px solid #f3f4f6;
    padding: 0 20px 12px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* Injected by SDK: .next-bundle-slot */
  .next-bundle-slot { padding: 10px 0; border-bottom: 1px solid #f3f4f6; }
  .next-bundle-slot:last-child { border-bottom: none; }

  .slot-row {
    display: grid;
    grid-template-columns: 44px 1fr auto;
    align-items: center;
    gap: 12px;
  }

  .slot-img { width: 44px; height: 44px; object-fit: cover; border-radius: 8px; background: #f3f4f6; }
  .slot-info { min-width: 0; }
  .slot-name {
    font-size: 13px; font-weight: 600; color: #111;
    margin: 0 0 6px; display: flex; align-items: center; gap: 6px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .slot-unit-label {
    font-size: 11px; font-weight: 500; color: #9ca3af;
    background: #f3f4f6; border-radius: 10px; padding: 1px 7px;
    white-space: nowrap;
  }
  .slot-price { font-size: 13px; font-weight: 700; color: #111; white-space: nowrap; margin: 0; }

  /* ── Variant selectors (default <select> mode) ── */
  .slot-selectors { display: flex; flex-wrap: wrap; gap: 6px; }

  /* Injected by SDK: .next-slot-variant-field */
  .next-slot-variant-field { display: flex; align-items: center; gap: 5px; }
  .next-slot-variant-label { font-size: 12px; color: #6b7280; }
  .next-slot-variant-select {
    font-size: 12px; padding: 3px 6px;
    border: 1px solid #d1d5db; border-radius: 6px;
    background: white; cursor: pointer;
  }

  /* ── Custom variant option buttons (swatch mode) ── */
  /* Injected by SDK: .next-slot-variant-group */
  .next-slot-variant-group { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }

  .variant-btn {
    font-size: 12px; padding: 3px 10px;
    border: 1.5px solid #d1d5db; border-radius: 20px;
    background: white; color: #374151;
    cursor: pointer; transition: border-color .12s, background .12s;
    line-height: 1.4;
  }
  .variant-btn:hover { border-color: #9ca3af; }

  /* SDK sets .next-variant-selected + data-selected="true" on the active option */
  .variant-btn.next-variant-selected,
  .variant-btn[data-selected="true"] {
    border-color: #111;
    background: #111;
    color: white;
  }

  /* ── CTA ── */
  .cta {
    margin-top: 16px; width: 100%; padding: 15px;
    background: #111; color: white; font-size: 15px; font-weight: 700;
    letter-spacing: .08em; text-transform: uppercase;
    border: none; border-radius: 50px; cursor: pointer; transition: background .15s;
    display: block;
  }
  .cta:hover { background: #374151; }
</style>
