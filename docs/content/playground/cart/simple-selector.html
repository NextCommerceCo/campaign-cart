<!--
title: Simple Selector
description: Full product page with variant selectors (color swatches + size pills), add-to-cart, and buy-now buttons.
order: 1
-->

<!--
  HOW THIS WORKS:
  ─────────────────────────────────────────────────────────────────────────────
  PackageSelectorEnhancer (data-next-selector):
    • Wraps all variant cards for a single dimension (e.g. color OR size).
    • data-next-selector-id  — unique name, shared with buttons that read from it.
    • data-next-selection-mode="select"  — just tracks selection; "swap" (default)
                                          also swaps the full cart immediately.

  Selector cards (data-next-selector-card):
    • Each card maps to ONE package ref_id via data-next-package-id.
    • data-next-selected="true"  — pre-selects this card on page load.
    • SDK adds/removes `.next-selected` on click.

  Add-to-Cart button (data-next-action="add-to-cart"):
    • data-next-selector-id  — reads the active package from that selector.
    • data-next-url          — redirect after success (pass to checkout, etc.).
    • data-next-clear-cart   — "true" to replace cart contents.

  Buy-Now button:
    • Same as add-to-cart but with data-next-url pointing to your checkout page.
  ─────────────────────────────────────────────────────────────────────────────
-->
