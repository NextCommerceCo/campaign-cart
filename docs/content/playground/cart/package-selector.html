<!--
title: Package / Quantity Selector
description: Quantity-bundle cards that let the user pick a package (e.g. 1 bottle, 3 bottles, 6 bottles) and immediately swap the cart.
order: 2
-->

<!--
  HOW THIS WORKS:
  ─────────────────────────────────────────────────────────────────────────────
  1. PackageSelectorEnhancer (data-next-selector, data-next-selector-id)
     Registers every [data-next-selector-card] inside it.
     mode="swap" (default) → selecting a card immediately replaces the cart
       with that package+quantity.
     mode="select" → just marks the active card; add-to-cart does the add.

  2. Each card (data-next-selector-card + data-next-package-id):
     • data-next-quantity  — units added when selected (default 1).
     • data-next-selected="true" — pre-select on load.
     • SDK assigns .next-selected and removes it from the other cards.

  3. The CTA button (data-next-action="add-to-cart", data-next-selector-id):
     Reads whatever package the selector has active and adds it.
  ─────────────────────────────────────────────────────────────────────────────
-->

<h2>Choose Your Package</h2>

<div class="packages"
     data-next-selector
     data-next-selector-id="pkg"
     data-next-selection-mode="swap">

  <!-- 1 bottle -->
  <div class="pkg-card"
       data-next-selector-card
       data-next-package-id="101"
       data-next-quantity="1">

    <div class="radio"></div>

    <div class="pkg-body">
      <p class="pkg-name">1 Bottle — 30-day supply</p>
      <p class="pkg-sub">Standard</p>
    </div>

    <div class="pkg-price">
      <p class="was">$59.99</p>
      <p class="now">$49.99</p>
      <p class="unit">per bottle</p>
    </div>

  </div>

  <!-- 3 bottles — pre-selected, best value -->
  <div class="pkg-card"
       data-next-selector-card
       data-next-package-id="102"
       data-next-quantity="3"
       data-next-selected="true">

    <div class="radio"></div>

    <div class="pkg-body">
      <p class="pkg-name">
        3 Bottles — 90-day supply
        <span class="badge">Most Popular</span>
      </p>
      <p class="pkg-sub">Save 25%</p>
    </div>

    <div class="pkg-price">
      <p class="was">$179.97</p>
      <p class="now">$134.97</p>
      <p class="unit">$44.99 / bottle</p>
    </div>

  </div>

  <!-- 6 bottles -->
  <div class="pkg-card"
       data-next-selector-card
       data-next-package-id="103"
       data-next-quantity="6">

    <div class="radio"></div>

    <div class="pkg-body">
      <p class="pkg-name">
        6 Bottles — 180-day supply
        <span class="badge">Best Value</span>
      </p>
      <p class="pkg-sub">Save 40%</p>
    </div>

    <div class="pkg-price">
      <p class="was">$359.94</p>
      <p class="now">$215.94</p>
      <p class="unit">$35.99 / bottle</p>
    </div>

  </div>

</div>

<!--
  Reads the active selection from "pkg" selector and navigates to /checkout.
  Remove data-next-url to stay on page (cart updated in background).
-->
<button
  class="cta"
  data-next-action="add-to-cart"
  data-next-selector-id="pkg"
  data-next-url="/checkout">
  ADD TO CART
</button>

<style>
  body { font-family: sans-serif; padding: 32px; max-width: 680px; }

  h2 { font-size: 20px; font-weight: 700; margin: 0 0 20px; color: #111; text-align: center; }

  /* ── Cards ── */
  .packages { display: flex; flex-direction: column; gap: 10px; }

  .pkg-card {
    display: grid; grid-template-columns: auto 1fr auto;
    align-items: center; gap: 16px;
    padding: 16px 20px; border: 2px solid #e5e7eb; border-radius: 12px;
    cursor: pointer; background: white; transition: border-color .15s, background .15s;
    user-select: none;
  }
  .pkg-card:hover { border-color: #9ca3af; }

  /* SDK adds .next-selected when this card is active */
  .pkg-card.next-selected {
    border-color: #111; background: #f9fafb;
  }

  /* Radio dot */
  .radio {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid #d1d5db; background: white;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: border-color .15s;
  }
  .pkg-card.next-selected .radio { border-color: #111; }
  .radio::after {
    content: ''; width: 10px; height: 10px; border-radius: 50%;
    background: #111; opacity: 0; transition: opacity .15s;
  }
  .pkg-card.next-selected .radio::after { opacity: 1; }

  /* Card body */
  .pkg-body {}
  .pkg-name { font-size: 15px; font-weight: 600; color: #111; }
  .pkg-sub  { font-size: 13px; color: #6b7280; margin-top: 2px; }
  .badge {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em;
    padding: 3px 8px; border-radius: 20px; background: #ecfdf5; color: #059669; margin-left: 8px;
  }

  /* Price column */
  .pkg-price { text-align: right; }
  .pkg-price .was  { font-size: 12px; color: #9ca3af; text-decoration: line-through; }
  .pkg-price .now  { font-size: 18px; font-weight: 700; color: #111; }
  .pkg-price .unit { font-size: 11px; color: #6b7280; }

  /* CTA */
  .cta {
    margin-top: 20px; width: 100%; padding: 15px;
    background: #111; color: white; font-size: 15px; font-weight: 700;
    letter-spacing: .08em; text-transform: uppercase;
    border: none; border-radius: 50px; cursor: pointer; transition: background .15s;
  }
  .cta:hover { background: #374151; }
</style>
