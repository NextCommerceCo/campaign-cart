<!--
title: Cart Item Slots (Per-Unit Variant Config)
description: Expand each cart item into individual configurable unit slots with visual variant selectors (color swatches / size pills).
order: 8
-->

<!--
  HOW THIS WORKS:
  ─────────────────────────────────────────────────────────────────────────────
  CartItemSlotsEnhancer (data-next-cart-slots):
    If the cart has 3× "6-bottle pack" → renders 3 separate slot cards (one per
    unit / bottle). Each slot can independently change its variant (color, size…).

  data-next-slot-template-id:
    ID of a <template> element. Variables: {slot.index}, {item.*}.

  data-next-variant-option-template-id  (optional):
    Replaces the default <select> dropdowns with custom HTML per option.
    Variables: {attr.code}, {attr.name}, {option.value}, {option.selected}.
    SDK adds .next-variant-selected + data-selected="true" to the active option.
    Omit this attribute to keep the default <select> behaviour.

  data-next-slot-filter  (optional JSON):
    { "productId": 42 }         — only show slots for product #42
    { "packageIds": [1,2,3] }   — only these packages

  Inside the slot template:
    <div data-next-variant-selectors></div>  — SDK populates this automatically
  ─────────────────────────────────────────────────────────────────────────────
-->

<!-- Slot card template -->
<template id="slot-tpl">
  <div class="slot-card">

    <img class="slot-img" src="{item.image}" alt="{item.name}" />

    <div class="slot-body">
      <div class="slot-header">
        <span class="slot-num">Unit #{slot.index}</span>
        <span class="slot-price">{item.unitPrice}</span>
      </div>
      <p class="slot-name">{item.productName}</p>

      <!--
        Placeholder — SDK replaces this with one variant-group block per
        attribute dimension (Color, Size, etc.) using the option template below.
        Remove data-next-variant-option-template-id on the container to get
        plain <select> dropdowns instead.
      -->
      <div data-next-variant-selectors></div>
    </div>

  </div>
</template>

<!--
  Custom variant option template — one copy rendered per option value.
  SDK sets data-next-variant-option, data-next-variant-value, data-selected
  on the outermost element automatically.
-->
<template id="variant-opt-tpl">
  <button class="opt-btn">{option.value}</button>
</template>

<h2>Customise your units</h2>

<div data-next-cart-slots
     data-next-slot-template-id="slot-tpl"
     data-next-variant-option-template-id="variant-opt-tpl"
     data-next-empty-template="<div class='empty-msg'>Add items to the cart first.</div>">
</div>

<style>
  body { font-family: sans-serif; padding: 24px; max-width: 640px; }

  h2 { font-size: 18px; font-weight: 700; margin: 0 0 16px; }

  /* ── Slot cards ── */
  .slot-card {
    display: grid; grid-template-columns: 64px 1fr;
    gap: 14px; padding: 16px; border: 1px solid #e5e7eb; border-radius: 12px;
    background: white; margin-bottom: 12px;
  }
  .slot-img { width: 64px; height: 64px; object-fit: cover; border-radius: 8px; background: #f3f4f6; }
  .slot-body { display: flex; flex-direction: column; gap: 6px; }
  .slot-header { display: flex; justify-content: space-between; align-items: baseline; }
  .slot-num   { font-size: 12px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: .06em; }
  .slot-name  { font-size: 15px; font-weight: 600; color: #111; }
  .slot-price { font-size: 14px; font-weight: 600; color: #111; }

  /* Variant groups rendered by SDK inside data-next-variant-selectors */
  .next-slot-variant-group { margin-top: 8px; }
  .next-slot-variant-group label { font-size: 12px; font-weight: 600; color: #374151; display: block; margin-bottom: 6px; }

  /* Default <select> styling */
  .next-slot-variant-group select {
    width: 100%; padding: 8px 10px; border: 1px solid #d1d5db;
    border-radius: 6px; font-size: 13px; background: white;
  }

  /* Custom option buttons (when variant-option-template-id is set) */
  .opt-btn {
    padding: 5px 12px; border: 1.5px solid #d1d5db; border-radius: 20px;
    font-size: 13px; cursor: pointer; background: white; color: #374151;
    margin-right: 6px; margin-bottom: 6px; transition: background .15s, border-color .15s;
  }
  /* SDK adds .next-variant-selected to the chosen option */
  .opt-btn.next-variant-selected { background: #111; border-color: #111; color: white; }

  .empty-msg { text-align: center; padding: 48px; color: #9ca3af; font-size: 14px; }
</style>
