<!--
title: Basic Selector
description: Simplest cart setup — three package cards in swap mode. Clicking a card immediately replaces the cart and enables the checkout button.
order: 1
layout: center
-->

<!--
  HOW THIS WORKS:
  ─────────────────────────────────────────────────────────────────────────────
  data-next-cart-selector + data-next-selection-mode="swap":
    The selector container. "swap" means clicking a card immediately updates
    the cart — no extra "Add to Cart" click needed.

  data-next-selector-card + data-next-package-id:
    Each card is tied to one package by its ref_id.
    data-next-selected="true" pre-selects a card on load.
    SDK adds/removes .next-selected on click.

  data-next-action="add-to-cart" + data-next-selector-id:
    Reads the currently selected package from the selector and adds it.
    data-next-url redirects after success (e.g. to /checkout).
  ─────────────────────────────────────────────────────────────────────────────
-->

<div class="package-selector">

  <h1 class="selector-heading">Choose Your Package</h1>

  <!-- ── Package selector (swap mode) ───────────────────────────── -->
  <div class="package-list"
       data-next-cart-selector
       data-next-selector-id="pkg"
       data-next-selection-mode="swap">

    <!-- 1 unit -->
    <div class="package-card"
         data-next-selector-card
         data-next-package-id="1"
         data-next-quantity="1">
      <div class="card-cover"></div>
      <div class="card-radio"></div>
      <div class="card-content">
        <p class="card-title">1× Bottle</p>
        <p class="card-subtitle">30-day supply</p>
      </div>
      <div class="card-pricing">
        <p class="price-current">$49.99</p>
        <p class="price-per">per bottle</p>
      </div>
    </div>

    <!-- 3 units — pre-selected -->
    <div class="package-card"
         data-next-selector-card
         data-next-package-id="2"
         data-next-quantity="3"
         data-next-selected="true">
      <div class="card-cover"></div>
      <div class="card-radio"></div>
      <div class="card-content">
        <p class="card-title">3× Bottles <span class="badge">Most Popular</span></p>
        <p class="card-subtitle">90-day supply · Save 20%</p>
      </div>
      <div class="card-pricing">
        <p class="price-original">$149.97</p>
        <p class="price-current">$119.97</p>
        <p class="price-per">$39.99 / bottle</p>
      </div>
    </div>

    <!-- 6 units -->
    <div class="package-card"
         data-next-selector-card
         data-next-package-id="3"
         data-next-quantity="6">
      <div class="card-cover"></div>
      <div class="card-radio"></div>
      <div class="card-content">
        <p class="card-title">6× Bottles <span class="badge badge--gold">Best Value</span></p>
        <p class="card-subtitle">180-day supply · Save 35%</p>
      </div>
      <div class="card-pricing">
        <p class="price-original">$299.94</p>
        <p class="price-current">$194.94</p>
        <p class="price-per">$32.49 / bottle</p>
      </div>
    </div>

  </div>

  <!-- ── Cart summary (live, from cartStore) ────────────────────── -->
  <div class="cart-summary" data-next-show="cart.hasItems">
    <div class="summary-row">
      <span>Subtotal</span>
      <span data-next-display="cart.subtotal"></span>
    </div>
    <!-- ── Offer discounts breakdown (CartSummaryEnhancer) ── -->
    <ul class="discount-list"
        data-next-cart-summary="offer_discounts">
      <template>
        <li class="discount-item">
          <span class="discount-name">{discount.name}</span>
          <span class="discount-amount">-{discount.amount}</span>
        </li>
      </template>
    </ul>

    <!-- ── Voucher discounts breakdown (CartSummaryEnhancer) ── -->
    <ul class="discount-list"
        data-next-cart-summary="voucher_discounts">
      <template>
        <li class="discount-item discount-item--voucher">
          <span class="discount-name">{discount.name}</span>
          <span class="discount-amount">-{discount.amount}</span>
        </li>
      </template>
    </ul>

    <!-- ── Shipping from API summary ── -->
    <div class="summary-row summary-row--shipping">
      <span>Shipping</span>
      <span data-next-cart-summary="shipping"></span>
    </div>

    <div class="summary-row summary-row--total">
      <span>Total</span>
      <span data-next-display="cart.total"></span>
    </div>
  </div>

  <!-- ── CTA ─────────────────────────────────────────────────────── -->
  <button class="btn-checkout"
          data-next-action="add-to-cart"
          data-next-selector-id="pkg"
          data-next-url="/checkout">
    Proceed to Checkout
  </button>

</div>

<style>
  body { font-family: sans-serif; background: #f8fafc; margin: 0; padding: 32px 16px; }

  .package-selector {
    max-width: 560px; margin: 0 auto;
    background: white; border-radius: 16px; padding: 28px 24px;
  }

  .selector-heading {
    font-size: 22px; font-weight: 700; color: #111;
    text-align: center; margin: 0 0 24px;
  }

  /* ── Package list ── */
  .package-list { display: flex; flex-direction: column; gap: 10px; }

  /* ── Package card ── */
  .package-card {
    position: relative;
    display: grid; grid-template-columns: auto 1fr auto;
    align-items: center; gap: 16px;
    padding: 16px 20px; border: 2px solid #e5e7eb; border-radius: 12px;
    background: white;
    transition: border-color .15s, box-shadow .15s;
    user-select: none;
  }
  .package-card:hover { border-color: #9ca3af; }
  /* SDK applies .next-selected when the card is active */
  .package-card.next-selected {
    border-color: #2563eb; background: #eff6ff;
    box-shadow: 0 0 0 3px rgba(37,99,235,.15);
  }

  /* Card cover — full-surface click target */
  .card-cover {
    position: absolute; inset: 0;
    border-radius: 10px;
    cursor: pointer; z-index: 1;
  }

  /* Radio dot */
  .card-radio {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid #d1d5db; background: white;
    flex-shrink: 0; position: relative; transition: border-color .15s;
  }
  .package-card.next-selected .card-radio { border-color: #2563eb; }
  .card-radio::after {
    content: ''; position: absolute;
    inset: 3px; border-radius: 50%;
    background: #2563eb; opacity: 0; transition: opacity .15s;
  }
  .package-card.next-selected .card-radio::after { opacity: 1; }

  /* Card content */
  .card-title    { font-size: 15px; font-weight: 600; color: #111; margin: 0 0 2px; }
  .card-subtitle { font-size: 13px; color: #6b7280; margin: 0; }

  .badge {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
    padding: 2px 8px; border-radius: 20px;
    background: #ecfdf5; color: #059669; margin-left: 6px;
  }
  .badge--gold { background: #fefce8; color: #92400e; }

  /* Pricing column */
  .card-pricing   { text-align: right; }
  .price-original { font-size: 12px; color: #9ca3af; text-decoration: line-through; margin: 0; }
  .price-current  { font-size: 17px; font-weight: 700; color: #111; margin: 0; }
  .price-per      { font-size: 11px; color: #6b7280; margin: 0; }

  /* ── Cart summary ── */
  .cart-summary {
    margin-top: 20px; padding: 14px 18px;
    border: 1px solid #e5e7eb; border-radius: 10px; background: white;
  }
  .summary-row {
    display: flex; justify-content: space-between;
    font-size: 14px; color: #374151; padding: 5px 0;
    border-bottom: 1px solid #f3f4f6;
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-row--discount  { color: #059669; font-weight: 500; }
  .summary-row--total     { font-weight: 700; font-size: 15px; color: #111; }

  /* ── Discount lists (CartSummaryEnhancer) ── */
  .discount-list {
    list-style: none; margin: 4px 0 0; padding: 0;
  }
  .discount-list.next-summary-empty { display: none; }
  .discount-item {
    display: flex; justify-content: space-between;
    font-size: 13px; color: #059669; padding: 4px 0;
  }
  .discount-item--voucher { color: #7c3aed; }
  .discount-name  { font-weight: 500; }
  .discount-amount { font-weight: 600; }
  .summary-row--shipping { font-size: 13px; color: #6b7280; }

  /* ── Checkout button ── */
  .btn-checkout {
    margin-top: 16px; width: 100%; padding: 15px;
    background: #2563eb; color: white; font-size: 15px; font-weight: 700;
    letter-spacing: .04em; text-transform: uppercase;
    border: none; border-radius: 50px; cursor: pointer;
    transition: background .15s;
  }
  .btn-checkout:hover { background: #1d4ed8; }
</style>
