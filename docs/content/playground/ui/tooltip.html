<!--
title: Tooltip
description: Show contextual tooltips on hover using a single data attribute.
order: 2
-->

<!--
  data-next-tooltip="<text>" — SDK injects the tooltip bubble on mount.
  Hover the ⓘ icons to see them.
-->
<div class="row">
  <label>Price per unit</label>
  <span class="info"
    data-next-tooltip="Price calculated based on the selected package quantity.">
    i
  </span>
</div>

<div class="row">
  <label>Subscription</label>
  <span class="info"
    data-next-tooltip="Subscribe and save 15% on every order. Cancel anytime.">
    i
  </span>
</div>

<div class="row">
  <label>Free shipping</label>
  <span class="info"
    data-next-tooltip="Free standard shipping on orders over $50.">
    i
  </span>
</div>

<style>
  body { font-family: sans-serif; padding: 48px; max-width: 400px; }
  /* SDK creates a .next-tooltip child inside [data-next-tooltip] */
  [data-next-tooltip] { position: relative; display: inline-block; cursor: help; }
  .next-tooltip {
    position: absolute; bottom: calc(100% + 6px); left: 50%;
    transform: translateX(-50%);
    background: #111; color: white; font-size: 12px; padding: 6px 10px;
    border-radius: 6px; white-space: nowrap; pointer-events: none;
    opacity: 0; transition: opacity 0.15s; z-index: 10;
  }
  [data-next-tooltip]:hover .next-tooltip { opacity: 1; }

  .row {
    display: flex; gap: 12px; align-items: center; margin-bottom: 16px;
    padding: 12px; border: 1px solid #e5e7eb; border-radius: 8px;
  }
  .row label { font-size: 14px; font-weight: 600; color: #374151; flex: 1; }
  .info {
    width: 18px; height: 18px; background: #6b7280; color: white;
    border-radius: 50%; display: inline-flex; align-items: center;
    justify-content: center; font-size: 11px; font-weight: 700; shrink: 0;
  }
</style>
